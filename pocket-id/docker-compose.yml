services:
  pocket-id:
    image: ghcr.io/pocket-id/pocket-id:v2
    restart: unless-stopped
    env_file: base.env
    secrets:
      - encryption_key
    ports:
      - 1411:1411
    healthcheck:
      test: [ "CMD", "/app/pocket-id", "healthcheck" ]
      interval: 1m30s
      timeout: 5s
      retries: 2
      start_period: 10s

secrets:
  encryption_key:
    environment: POCKET_ID_ENCRYPTION_KEY
